<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新增文章 | 宇揚的旅遊札記</title>
    <meta name="description" content="宇揚的旅遊札記文章新增工具。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="index.html" aria-label="宇揚的旅遊札記首頁">
        <span class="brand-mark">途</span>
        <span>宇揚的旅遊札記</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="site-nav" data-nav>
        <a href="index.html#stories">旅行文章</a>
        <a href="index.html#subscribe">訂閱</a>
      </nav>
    </header>

    <main class="admin-page">
      <section class="admin-header">
        <p class="eyebrow">Admin</p>
        <h1>新增旅行文章</h1>
        <p>
          用 Word、Canva 或其他工具排好版後匯出 PDF，在這裡上傳成一篇部落格文章。
        </p>
        <p class="admin-mode" data-admin-mode>正在確認發布模式。</p>
      </section>

      <section class="admin-layout">
        <form class="admin-form" data-admin-form>
          <label>
            <span>文章標題</span>
            <input name="title" type="text" placeholder="例如：首爾7天6夜之旅" required />
          </label>

          <div class="form-row">
            <label>
              <span>文章分類</span>
              <select name="category">
                <option value="city">城市散步</option>
                <option value="nature">自然風景</option>
                <option value="food">美食咖啡</option>
              </select>
            </label>
          </div>

          <label>
            <span>摘要</span>
            <textarea name="excerpt" rows="3" placeholder="例如：臨時起意的首爾獨旅~" required></textarea>
          </label>

          <label>
            <span>封面圖片</span>
            <input name="cover" type="file" accept="image/*" />
          </label>

          <label>
            <span>PDF 文章檔</span>
            <input name="pdf" type="file" accept="application/pdf,.pdf" required />
          </label>

          <div class="admin-actions">
            <button class="button primary" type="submit">產生文章</button>
            <button class="button neutral" type="reset">清空</button>
          </div>
        </form>

        <aside class="admin-output" data-admin-output>
          <h2>產生結果</h2>
          <p>按「產生文章」後，PDF 會存進網站，這裡會顯示可以點開的公開文章網址。</p>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 宇揚的旅遊札記</p>
      <div>
        <a href="index.html#stories">文章</a>
        <a href="index.html#subscribe">訂閱</a>
      </div>
    </footer>

    <script src="script.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
