            <section>
              <h2>Day 1：抵達與入住</h2>
              <p>第一天以移動和熟悉環境為主。抵達首爾後先完成入境、交通卡和住宿入住，把體力留給後面幾天的城市散步。</p>
            </section>

            <section>
              <h2>交通筆記</h2>
              <p>從機場進市區時，建議先確認住宿離地鐵站的距離，再決定搭機場鐵路、巴士或計程車。若行李多，少轉乘通常比省一點車資更重要。</p>
            </section>

            <section>
              <h2>行程節奏</h2>
              <p>七天行程適合把熱門景點、咖啡店、逛街區域和臨時休息時間交錯安排。每天保留一段彈性時段，實際走起來會更舒服。</p>
