<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宇揚的旅行筆記 | 個人旅遊部落格</title>
    <meta
      name="description"
      content="宇揚的旅行筆記，整理城市散步、自然風景與美食路線，保存每一次出發前後的觀察與回憶。"
    />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="top">
      <section class="hero">
        <img
          class="hero-image"
          src="assets/blog-cover.png"
          alt="旅行途中拍攝的城市與風景"
        />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1>宇揚的旅行筆記<br />城市、風景與餐桌</h1>
          <p class="hero-copy">
            把旅途中遇見的路線、景色、交通與吃喝心得整理成可回頭查閱的旅行故事。
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#stories">閱讀最新文章</a>
          </div>
        </div>
      </section>

      <section class="section stories-section" id="stories">
        <div class="section-heading">
          <p class="eyebrow">Latest Stories</p>
          <h2>最新文章</h2>
        </div>

        <div class="filter-bar" aria-label="文章篩選">
          <label class="search-field">
            <span>搜尋文章</span>
            <input type="search" data-search />
          </label>
          <div class="category-tabs" role="tablist" aria-label="文章分類">
            <button class="tab active" type="button" data-filter="all">全部</button>
            <button class="tab" type="button" data-filter="city">城市路線</button>
            <button class="tab" type="button" data-filter="nature">自然風景</button>
            <button class="tab" type="button" data-filter="food">美食餐桌</button>
          </div>
        </div>

        <div class="story-grid" data-story-grid></div>
        <p class="empty-state" data-empty hidden>找不到符合條件的文章。</p>
      </section>

      <section class="subscribe" id="subscribe">
        <div>
          <p class="eyebrow">Newsletter</p>
          <h2>收到下一篇旅行筆記</h2>
          <p>留下 Email，之後有新的旅行文章時可以第一時間通知你。</p>
        </div>
        <form class="subscribe-form" data-form>
          <label>
            <span>Email</span>
            <input type="email" placeholder="you@example.com" required />
          </label>
          <button class="button primary" type="submit">訂閱</button>
          <p class="form-message" data-form-message role="status"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 宇揚的旅行筆記</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
