<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宇揚的旅遊札記 | 個人旅遊部落格</title>
    <meta
      name="description"
      content="宇揚的旅遊札記是一個分享國外遊記、自然旅行、在地美食與旅程實用資訊的個人旅遊部落格。"
    />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="#top" aria-label="宇揚的旅遊札記首頁">
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="site-nav" data-nav>
        <a href="#stories">旅行文章</a>
        <a href="#subscribe">訂閱</a>
        <a href="admin.html">新增文章</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero">
        <img
          class="hero-image"
          src="assets/blog-cover.png"
          alt="海岸旅行風景"
        />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1>譯黃大帝<br />旅遊 × 翻譯</h1>
          <p class="hero-copy">
            譯起來與我環遊世界
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#stories">閱讀最新文章</a>
          </div>
        </div>
      </section>

      <section class="section stories-section" id="stories">
        <div class="section-heading">
          <p class="eyebrow">Latest Stories</p>
          <h2>最新文章</h2>
        </div>

        <div class="filter-bar" aria-label="文章篩選">
          <label class="search-field">
            <span>搜尋文章</span>
            <input type="search" data-search />
          </label>
          <div class="category-tabs" role="tablist" aria-label="文章分類">
            <button class="tab active" type="button" data-filter="all">全部</button>
            <button class="tab" type="button" data-filter="city">國外遊記</button>
            <button class="tab" type="button" data-filter="nature">自然風景</button>
            <button class="tab" type="button" data-filter="food">美食咖啡</button>
          </div>
        </div>

        <div class="story-grid" data-story-grid></div>
        <p class="empty-state" data-empty hidden>目前沒有符合條件的文章。</p>
      </section>

      <section class="subscribe" id="subscribe">
        <div>
          <p class="eyebrow">Newsletter</p>
          <h2>準時收看我的下一篇文章</h2>
          <p>及時收看最新上架的新文章</p>
        </div>
        <form class="subscribe-form" data-form>
          <label>
            <span>Email</span>
            <input type="email" placeholder="you@example.com" required />
          </label>
          <button class="button primary" type="submit">訂閱</button>
          <p class="form-message" data-form-message role="status"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 譯黃大帝</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
